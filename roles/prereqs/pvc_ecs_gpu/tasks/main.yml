---
# TODO: Add Nvidia drivers

- name: Install Nvidia repository
  get_url:
    url: "https://developer.download.nvidia.com/compute/cuda/repos/rhel{{ ansible_distribution_major_version }}/x86_64/cuda-rhel{{ ansible_distribution_major_version }}.repo"
    dest: /etc/yum.repos.d/
    mode: '0644'

- name: Install Nvidia Container repository
  get_url:
    url: "https://nvidia.github.io/libnvidia-container/stable/rpm/nvidia-container-toolkit.repo"
    dest: /etc/yum.repos.d/
    mode: '0644'

# =========================================================================
# CLEANUP PHASE: Force-purge all existing Nvidia/kmod infrastructure remnants
# =========================================================================
- name: Completely purge all legacy and open-source Nvidia packaging components
  ansible.builtin.shell: "dnf remove 'nvidia*' 'kmod-nvidia*' 'cuda*' -y --disableexcludes=all"
  failed_when: false  # Bypasses errors if a host is already pristine

- name: Clean dnf system cache data structures
  ansible.builtin.shell: "dnf clean all --disableexcludes=all && rm -rf /var/cache/dnf"
  changed_when: false

# =========================================================================
# MODULE STREAM MANAGEMENT
# =========================================================================
- name: Reset nvidia-driver module stream via shell
  ansible.builtin.shell: "dnf module reset nvidia-driver -y --disableexcludes=all"
  changed_when: false

- name: Track standard driver stream natively
  ansible.builtin.dnf:
    name: '@nvidia-driver:latest-dkms'
    state: present
    disable_excludes: all  # <-- Valid here because it's a native dnf task

# -------------------------------------------------------------------------
# INSTALLATION: Install flat tracking packages directly to dodge parsing limits
# -------------------------------------------------------------------------
- name: Install exact Nvidia Driver tracking packages directly
  ansible.builtin.dnf:
    name:
      - nvidia-driver
      - nvidia-driver-cuda
    state: present
    disable_excludes: all

- name: Install Targeted CUDA Toolkit Components
  ansible.builtin.dnf:
    name:
      - cuda-toolkit
      - cuda-runtime
    state: present
    disable_excludes: all

- name: Blacklist nouveau
  ansible.builtin.lineinfile:
    path: /etc/modprobe.d/nouveau-blacklist.conf
    regexp: 'blacklist nouveau'
    line: 'blacklist nouveau'
    create: true

- name: Dracut
  ansible.builtin.shell: dracut --force
  changed_when: true

- name: Enable nvidia-fabricmanager
  ansible.builtin.service:
    name: nvidia-fabricmanager
    enabled: true
  failed_when: false # Safe-guard in case fabric-manager isn't required by the architecture configuration

- name: Enable nvidia-persistenced
  ansible.builtin.service:
    name: nvidia-persistenced
    enabled: true

- name: Install nvidia-container-toolkit 
  ansible.builtin.dnf:
    name: nvidia-container-toolkit
    state: present