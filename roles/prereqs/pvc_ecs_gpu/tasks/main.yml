---
# TODO: Add Nvidia drivers

- name: Install Nvidia repository
  get_url:
    url: "https://developer.download.nvidia.com/compute/cuda/repos/rhel{{ ansible_distribution_major_version }}/x86_64/cuda-rhel{{ ansible_distribution_major_version }}.repo"
    dest: /etc/yum.repos.d/
    mode: '0644'

- name: Install Nvidia Container repository
  get_url:
    url: "https://nvidia.github.io/libnvidia-container/stable/rpm/nvidia-container-toolkit.repo"
    dest: /etc/yum.repos.d/
    mode: '0644'

# -------------------------------------------------------------------------
# CLEANUP: Clear out old NvFBCOpenGL along with NVML to stop depsolve errors
# -------------------------------------------------------------------------
- name: Remove conflicting legacy Nvidia 525 tracking packages
  ansible.builtin.shell: "rpm -e --nodeps nvidia-driver-NVML nvidia-driver-NvFBCOpenGL nvidia-driver-devel nvidia-fabric-manager libnvidia-nscq-525 || true"
  changed_when: false

# -------------------------------------------------------------------------
# MODULE STREAM MANAGEMENT: Reset and switch to the new 610-open stream
# -------------------------------------------------------------------------

#- name: Reset nvidia-driver module stream
#  ansible.builtin.dnf:
#    name: nvidia-driver
#    state: reset_modules

- name: Reset nvidia-driver module stream via shell (Ansible 2.15 compatibility)
  ansible.builtin.shell: "dnf module reset nvidia-driver -y"
  changed_when: false

- name: Switch and enable nvidia-driver 610-open module stream
  ansible.builtin.dnf:
    name: '@nvidia-driver:610-open'
    state: present

# -------------------------------------------------------------------------
# INSTALLATION: Install CUDA meta-package & driver packages via the stream
# -------------------------------------------------------------------------
- name: Install Nvidia Driver packages via stream profiles
  ansible.builtin.dnf:
    name: "@nvidia-driver:default"
    state: present

- name: Install CUDA Meta-packagegit push origin --delete refs/heads/feature/rhel9-cuda-upgrade
  ansible.builtin.dnf:
    name: "cuda"
    state: present

- name: Blacklist nouveau
  ansible.builtin.lineinfile:
    path: /etc/modprobe.d/nouveau-blacklist.conf
    regexp: 'blacklist nouveau'
    line: 'blacklist nouveau'
    create: true

- name: Dracut
  ansible.builtin.shell: dracut --force
  changed_when: true

- name: Enable nvidia-fabricmanager
  ansible.builtin.service:
    name: nvidia-fabricmanager
    enabled: yes
  failed_when: false # Safe-guard in case fabric-manager isn't used by the 610-open profile

- name: Enable nvidia-persistenced
  ansible.builtin.service:
    name: nvidia-persistenced
    enabled: yes

- name: Install nvidia-container-toolkit 
  ansible.builtin.dnf:
    name: nvidia-container-toolkit
    state: present